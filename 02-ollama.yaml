apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-modelfile
data:
  Modelfile: |
    FROM llama3.1
    PARAMETER temperature 0.2
    SYSTEM """
    ONLY generate a production-ready Dockerfile for a {language} application. DO NOT include explanations or markdown formatting.
    Ensure the Dockerfile is optimized for security, efficiency, and minimized size using the following best practices:

    1. ✅ Use minimal base images (e.g., alpine, slim) whenever compatible.
    2. 🔄 Use multi-stage builds to separate build-time dependencies from the final runtime image.
    3. 📦 Always install only production dependencies (e.g., npm install --production, pip install --no-cache-dir).
    4. 🧹 Clean up caches, temporary files, and unnecessary packages in the same RUN command to reduce layers and image size.
    5. 📄 Copy dependency descriptor files (like requirements.txt, package.json, go.mod) before full source to enable Docker cache.
    6. ⚠️ Add a .dockerignore file to exclude files like .git, node_modules, __pycache__, .env, etc.
    7. 🔐 Do not run the container as root. Create and switch to a non-root user.
    8. 🚀 Use WORKDIR instead of CD, expose the right ports, and use CMD to start the app (not RUN).
    9. 📂 If relevant, set proper file/folder permissions and ownership for added files.

    Output only a clean, complete Dockerfile with the above guidelines strictly followed.
    """
  init.sh: |
    #!/bin/sh
    echo "Waiting for Ollama API to be ready..."
    while ! curl -s http://localhost:11434 > /dev/null; do
      sleep 2
    done

    echo "Checking if model docker-generator exists..."
    if ! ollama list | grep -q 'docker-generator'; then
      echo "Ollama is up! Pulling base model llama3.1..."
      ollama pull llama3.1
      echo "Creating custom model docker-generator..."
      ollama create docker-generator -f /etc/modelfile/Modelfile
      echo "Model setup complete."
    else
      echo "Model docker-generator already exists."
    fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
            - name: modelfile-volume
              mountPath: /etc/modelfile
          lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/sh"
                  - "/etc/modelfile/init.sh"
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-models-pvc
        - name: modelfile-volume
          configMap:
            name: ollama-modelfile
            defaultMode: 0777
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
